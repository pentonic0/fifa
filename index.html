<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026™ Countdown</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --color-1: #00ff87; /* Neon Green */
            --color-2: #60efff; /* Cyan */
            --color-3: #7000ff; /* Purple */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Dynamic Aurora Background */
        .background-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            filter: blur(120px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 50vw;
            height: 50vw;
            background: var(--color-1);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 40vw;
            height: 40vw;
            background: var(--color-2);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 45vw;
            height: 45vw;
            background: var(--color-3);
            top: 30%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.2); }
            100% { transform: translate(-10%, -10%) scale(0.9); }
        }

        /* Main Content Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 1000px;
            padding: 2rem;
        }

        /* Logo Styling */
        .logo-container {
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo {
            width: 180px;
            height: auto;
            max-width: 100%;
        }

        /* Header Text */
        .subtitle {
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 500;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        /* Countdown Grid */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        /* Glassmorphic Time Boxes */
        .time-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .time-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .time-box:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .time-box:hover::before {
            left: 150%;
        }

        .number {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom right, #ffffff, #a8b2d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .countdown {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .number {
                font-size: 3rem;
            }
            .logo {
                width: 140px;
            }
        }

        @media (max-width: 480px) {
            .time-box {
                padding: 1.5rem 0.5rem;
            }
            .number {
                font-size: 2.2rem;
            }
            .label {
                font-size: 0.7rem;
            }
            .subtitle {
                font-size: 0.75rem;
                letter-spacing: 0.2em;
            }
        }

        /* Keyframe Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flip animation for numbers */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: var(--color-1); -webkit-text-fill-color: var(--color-1); }
            100% { transform: scale(1); }
        }
        
        .pop-anim {
            animation: pop 0.3s ease-out;
        }
    </style>
</head>
<body>

    <!-- Animated Aurora Background -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg" alt="FIFA World Cup 26 Logo" class="logo">
        </div>

        <!-- Heading -->
        <h2 class="subtitle">Official Kickoff Countdown</h2>

        <!-- Countdown Timer -->
        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
    </div>

    <script>
        // Set the date for the kickoff: June 11, 2026 12:00:00 (Adjust timezone as needed)
        const kickoffDate = new Date("June 11, 2026 12:00:00").getTime();

        // DOM Elements
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        // Store previous values to trigger animations only when numbers change
        let prevDays, prevHours, prevMinutes, prevSeconds;

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = kickoffDate - now;

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // If the countdown is over
            if (distance < 0) {
                document.querySelector('.countdown').innerHTML = "<h1 style='font-family: Orbitron; font-size: 3rem; text-align: center; width: 100%;'>THE TOURNAMENT HAS BEGUN!</h1>";
                return;
            }

            // Format numbers to always have two digits
            const formattedDays = days < 10 ? "0" + days : days;
            const formattedHours = hours < 10 ? "0" + hours : hours;
            const formattedMinutes = minutes < 10 ? "0" + minutes : minutes;
            const formattedSeconds = seconds < 10 ? "0" + seconds : seconds;

            // Update DOM & Trigger Animations
            updateElement(daysEl, formattedDays, prevDays);
            updateElement(hoursEl, formattedHours, prevHours);
            updateElement(minutesEl, formattedMinutes, prevMinutes);
            updateElement(secondsEl, formattedSeconds, prevSeconds);

            // Update previous values
            prevDays = formattedDays;
            prevHours = formattedHours;
            prevMinutes = formattedMinutes;
            prevSeconds = formattedSeconds;
        }

        function updateElement(element, newValue, prevValue) {
            if (newValue !== prevValue) {
                element.innerText = newValue;
                
                // Remove and re-add the animation class to restart the animation
                element.classList.remove('pop-anim');
                void element.offsetWidth; // Trigger reflow to restart animation
                element.classList.add('pop-anim');
            }
        }

        // Run initially to prevent layout flash
        updateCountdown();

        // Update every second
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
